kind: vocabulary
id: domains
version: 1.0.0
entries:
  - id: common
    label: Общий
    description: Общие шаги постановки задачи и подготовки спецификации, не привязанные к одному домену.
  - id: frontend
    label: Фронтенд
    description: Пользовательские интерфейсы, экраны, потоки взаимодействия и UX-ограничения.
  - id: ml
    label: Машинное обучение
    description: Предиктивная аналитика, постановка ML-задачи, данные и требования к качеству модели.
  - id: security
    label: ИБ и комплаенс
    description: Ограничения по персональным данным, ИБ, доступу, шифрованию и требованиям к контуру.
  - id: integration
    label: Интеграции
    description: Источники данных, API, режим обновления и операционная модель взаимодействия с внешними системами.
