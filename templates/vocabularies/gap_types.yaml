kind: vocabulary
id: gap_types
version: 1.0.0
entries:
  - id: unclear_goal
    label: Непонятная цель
    description: Бизнес-цель пока сформулирована недостаточно чётко, чтобы двигаться дальше.
  - id: request_facts_not_extracted
    label: Не выделены факты запроса
    description: Исходный запрос ещё не разобран на явные факты, сущности, сигналы и ожидаемые результаты.
  - id: project_goal_not_defined
    label: Не сформирована гипотеза цели проекта
    description: Пока не определено, какую проблему решают, какого эффекта ждут и как может выглядеть успех этапа.
  - id: constraints_not_inventoried
    label: Не собраны ограничения
    description: Не выделены явные и подразумеваемые ограничения, обязательные условия и зависимые допущения.
  - id: request_ambiguities_unscanned
    label: Не разобраны неоднозначности запроса
    description: Не найдены противоречия, пробелы и потенциально блокирующие места исходной постановки.
  - id: request_not_normalized
    label: Запрос не нормализован
    description: Исходный запрос ещё не разобран на факты, ограничения, ожидания и неоднозначности.
  - id: business_outcome_unclear
    label: Бизнес-результат не определён
    description: Непонятно, какой бизнес-эффект, KPI и управленческие решения должен поддержать проект.
  - id: scope_boundaries_missing
    label: Не определены границы этапа
    description: Не зафиксированы in-scope, out-of-scope и границы текущего этапа PoV/PoC/pilot.
  - id: stakeholders_not_identified
    label: Не выделены стейкхолдеры
    description: Пока не определены основные группы стейкхолдеров, их роли и ожидания.
  - id: decision_owners_not_defined
    label: Не определены владельцы решений
    description: Неясно, кто принимает ключевые решения и кто участвует в обязательных согласованиях.
  - id: operating_model_not_outlined
    label: Не собран черновой контур операционной модели
    description: Пока не описан процесс, роли, входы, потребители результата и точки ручного участия.
  - id: stakeholders_not_mapped
    label: Не разобраны стейкхолдеры и операционная модель
    description: Неясно, кто использует результат, кто принимает решения и как решение встроится в процесс.
  - id: solution_option_space_not_defined
    label: Не выделено пространство вариантов решения
    description: Ещё не определены жизнеспособные варианты решения для текущего этапа.
  - id: solution_options_not_compared
    label: Не сравнили варианты решения
    description: Не проведено осмысленное сравнение вариантов решения и не выбран рекомендуемый путь.
  - id: delivery_scope_not_defined
    label: Не определён состав поставки этапа
    description: Не зафиксировано, что именно должно быть поставлено на текущем этапе, а что вынесено за его рамку.
  - id: acceptance_model_missing
    label: Не определена модель приемки
    description: Не согласованы критерии приемки, подтверждающие материалы и обязательные согласования.
  - id: delivery_plan_missing
    label: Не определён план реализации
    description: Не описаны фазы, зависимости, риски и критические входы проекта.
  - id: dependency_map_missing
    label: Не собрана карта зависимостей
    description: Не выделены критические входы, внешние решения, условия остановки и зависимости этапа.
  - id: missing_user_stories
    label: Не собраны user story
    description: Ещё не описаны основные пользователи, их сценарии и ожидания.
  - id: alternatives_not_explored
    label: Не разобраны альтернативы
    description: Варианты решения ещё не рассмотрены и не сравнены на осмысленном уровне.
  - id: predictive_problem_undefined
    label: Не определена предиктивная задача
    description: Не зафиксированы target, горизонт прогноза, unit of prediction и метрики качества.
  - id: data_landscape_unassessed
    label: Не оценены данные и реализуемость
    description: Не проведена оценка источников, качества данных, рисков разнородности и feasibility.
  - id: security_constraints_unassessed
    label: Не определены ограничения ИБ и ПДн
    description: Не разобраны требования по контуру, шифрованию, обезличиванию, доступу и использованию внешних сервисов.
  - id: integration_model_unassessed
    label: Не определена интеграционная модель
    description: Не разобраны источники, API, режим обновления, ответственность и схема эксплуатации.
  - id: draft_not_reviewed
    label: Черновик не прошёл ревью
    description: Текущий черновик спецификации ещё не прошёл структурированную проверку.
  - id: frontend_user_flows_missing
    label: Не разобраны пользовательские потоки интерфейса
    description: Для интерфейсной части ещё не выделены основные роли, потоки и ожидания по экранам.
