kind: vocabulary
id: artifact_roles
version: 1.0.0
entries:
  - id: business_request
    label: Бизнес-запрос
    description: Исходная формулировка задачи от пользователя или оператора.
  - id: request_fact_sheet
    label: Выделенные факты запроса
    description: Структурированный список явных фактов, сущностей, результатов и сигналов, обнаруженных в исходном запросе.
  - id: goal_hypothesis
    label: Гипотеза цели проекта
    description: Рабочая гипотеза о цели проекта, ожидаемом эффекте и признаках успеха этапа.
  - id: constraint_inventory
    label: Реестр ограничений
    description: Явные и подразумеваемые ограничения, обязательные условия и зависимые допущения проекта.
  - id: ambiguity_gap_report
    label: Карта неоднозначностей и пробелов
    description: Найденные противоречия, пропуски, безопасные допущения и потенциальные блокирующие вопросы.
  - id: normalized_request
    label: Нормализованный запрос
    description: Сводный структурированный разбор исходного бизнес-запроса с выделением проблемы, ограничений и неоднозначностей.
  - id: business_outcome_model
    label: Модель бизнес-результата
    description: Формализация целевого бизнес-эффекта, KPI, ожидаемых решений и ценности проекта.
  - id: scope_boundary_matrix
    label: Границы и этапность
    description: Что входит и не входит в текущий этап, а также кандидаты на следующие фазы.
  - id: stakeholder_map
    label: Карта стейкхолдеров
    description: Группы стейкхолдеров, их роли, ожидания и влияние на ход проекта.
  - id: decision_ownership_matrix
    label: Матрица владельцев решений
    description: Кто владеет ключевыми решениями, кто согласует их и где возникают зоны размытой ответственности.
  - id: operating_model_outline
    label: Черновой контур операционной модели
    description: Черновое описание процесса, ролей, входов, потребителей результата и точек ручного участия.
  - id: stakeholder_operating_model
    label: Стейкхолдеры и операционная модель
    description: Карта пользователей, владельцев решений, ролей и целевого сценария использования результата.
  - id: solution_option_inventory
    label: Набор вариантов решения
    description: Перечень жизнеспособных вариантов текущего этапа и условий, при которых каждый из них имеет смысл.
  - id: solution_tradeoff_matrix
    label: Матрица альтернатив
    description: Сравнение вариантов решения, анализ компромиссов и рекомендуемая конфигурация пилота.
  - id: delivery_scope_definition
    label: Состав поставки этапа
    description: Что именно должно быть поставлено на текущем этапе, а что сознательно вынесено за его рамку.
  - id: acceptance_model_definition
    label: Модель приемки этапа
    description: Критерии приемки, подтверждающие материалы, обязательные согласования и условия отклонения результата.
  - id: delivery_acceptance_plan
    label: Модель поставки и приемки
    description: Результаты этапа, критерии приемки, входы от заказчика и подтверждающие материалы успешности.
  - id: dependency_map
    label: Карта зависимостей
    description: Критические входы, внешние решения, условия остановки и зависимости текущего этапа.
  - id: implementation_dependency_plan
    label: План реализации и зависимости
    description: Этапы, зависимости, риски, критические входы и проектный контур выполнения работ.
  - id: clarification_notes
    label: Результат уточнения
    description: Структурированный результат уточнения бизнес-запроса.
  - id: user_story_map
    label: Карта user story
    description: Структурированное описание ролей, сценариев и пользовательских путей.
  - id: alternatives_analysis
    label: Анализ альтернатив
    description: Сравнение возможных направлений решения.
  - id: predictive_problem_definition
    label: Определение предиктивной задачи
    description: Формализация цели предсказания, горизонта, метрик и требований к интерпретируемости результата.
  - id: data_landscape_assessment
    label: Оценка данных и реализуемости
    description: Источники данных, ключевые признаки, риски качества и вывод о реализуемости.
  - id: security_compliance_constraints
    label: Ограничения ИБ и комплаенса
    description: Ограничения по ПДн, ИБ, шифрованию, доступу, контуру и использованию внешних сервисов.
  - id: integration_operating_model
    label: Интеграционная и операционная модель
    description: Источники, API, обновление, ответственность и эксплуатационная схема решения.
  - id: requirements_spec
    label: Техническое задание
    description: Черновик или финальная версия технического задания.
  - id: review_report
    label: Отчёт ревью
    description: Замечания, выводы и результат проверки.
  - id: ui_requirements_outline
    label: Контур UI-требований
    description: Черновое описание ролей, пользовательских потоков, экранов и UX-ограничений.
