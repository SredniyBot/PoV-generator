    title: Определить предиктивную ML-задачу
    insert: before
    anchor_step: solution_options_analysis
    template: ml.predictive_problem_definition@1.0.0
    required: true
    completion:
      readiness:
        - predictive_problem_defined
      artifact_roles:
        - predictive_problem_definition
  - id: data_landscape_assessment
    title: Оценить данные и реализуемость для ML
    insert: before
    anchor_step: solution_options_analysis
    template: ml.data_landscape_assessment@1.0.0
    required: true
    completion:
      readiness:
        - data_feasibility_assessed
      artifact_roles:
        - data_landscape_assessment
