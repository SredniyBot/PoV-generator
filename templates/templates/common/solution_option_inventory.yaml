kind: template
id: common.solution_option_inventory
version: 1.0.0
name: Формирование набора вариантов решения
type: executable
status: active
domain: common
semantics:
  template_role: meta_analysis
  cognitive_role: solution_option_inventory
  closes_gaps:
    - solution_option_space_not_defined
  raises_readiness:
    - dimension: solution_option_space_defined
      status: ready
activation:
  required_readiness:
    - business_outcome_defined
    - scope_boundaries_defined
    - stakeholders_mapped
  forbidden_open_gaps:
    - business_outcome_unclear
    - scope_boundaries_missing
    - stakeholders_not_mapped
planning:
  priority: 101
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - normalized_request
    - business_outcome_model
    - scope_boundary_matrix
    - stakeholder_operating_model
  optional_artifact_roles:
    - predictive_problem_definition
    - data_landscape_assessment
    - security_compliance_constraints
    - integration_operating_model
    - ui_requirements_outline
outputs:
  artifact_roles:
    - solution_option_inventory
framework:
  summary: >
    Сформируй несколько жизнеспособных вариантов решения для текущего этапа. Пока не выбирай
    лучший путь окончательно: цель шага — построить пространство вариантов и описать, чем
    они принципиально отличаются по рамке этапа, сложности, данным, ИБ, интеграциям и
    уровню ожидаемого результата.
context_policy:
  max_tokens: 2600
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
