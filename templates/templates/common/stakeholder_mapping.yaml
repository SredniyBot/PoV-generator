kind: template
id: common.stakeholder_mapping
version: 1.0.0
name: Выделение стейкхолдеров проекта
type: executable
status: active
domain: common
semantics:
  template_role: meta_analysis
  cognitive_role: stakeholder_mapping
  closes_gaps:
    - stakeholders_not_identified
  raises_readiness:
    - dimension: stakeholders_identified
      status: ready
activation:
  required_readiness:
    - business_outcome_defined
    - scope_boundaries_defined
  forbidden_open_gaps:
    - business_outcome_unclear
    - scope_boundaries_missing
planning:
  priority: 107
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - business_outcome_model
    - scope_boundary_matrix
outputs:
  artifact_roles:
    - stakeholder_map
framework:
  summary: >
    Выдели группы стейкхолдеров: заказчики, пользователи, владельцы данных, ИТ, ИБ, команды
    внедрения, согласующие и иные вовлечённые стороны. Для каждой группы опиши её интерес,
    ожидания и влияние на проект. Не переходи пока к полной операционной модели.
context_policy:
  max_tokens: 4200
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
