kind: template
id: common.acceptance_model_definition
version: 1.0.0
name: Определение модели приемки этапа
type: executable
status: active
domain: common
semantics:
  template_role: meta_analysis
  cognitive_role: acceptance_model_definition
  closes_gaps:
    - acceptance_model_missing
  raises_readiness:
    - dimension: acceptance_model_defined
      status: ready
activation:
  required_readiness:
    - solution_options_compared
    - delivery_scope_defined
  forbidden_open_gaps:
    - solution_options_not_compared
    - delivery_scope_not_defined
planning:
  priority: 95
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - business_outcome_model
    - scope_boundary_matrix
    - stakeholder_operating_model
    - solution_tradeoff_matrix
    - delivery_scope_definition
outputs:
  artifact_roles:
    - acceptance_model_definition
framework:
  summary: >
    Зафиксируй, как именно будет приниматься текущий этап: какие критерии должны быть
    выполнены, какие доказательства успеха нужны, кто подтверждает результат, какие входы
    от заказчика обязательны и в каких случаях этап считается неуспешным или незавершённым.
context_policy:
  max_tokens: 4200
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
