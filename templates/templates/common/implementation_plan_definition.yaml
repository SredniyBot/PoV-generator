kind: template
id: common.implementation_plan_definition
version: 1.0.0
name: План реализации и зависимости
type: executable
status: active
domain: common
semantics:
  template_role: meta_analysis
  cognitive_role: delivery_planning
  closes_gaps:
    - delivery_plan_missing
  raises_readiness:
    - dimension: delivery_plan_defined
      status: ready
activation:
  required_readiness:
    - solution_options_compared
    - acceptance_model_defined
    - dependency_map_defined
  forbidden_open_gaps:
    - solution_options_not_compared
    - acceptance_model_missing
planning:
  priority: 90
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - scope_boundary_matrix
    - stakeholder_operating_model
    - solution_tradeoff_matrix
    - delivery_acceptance_plan
    - dependency_map
  optional_artifact_roles:
    - predictive_problem_definition
    - data_landscape_assessment
    - security_compliance_constraints
    - integration_operating_model
outputs:
  artifact_roles:
    - implementation_dependency_plan
framework:
  summary: >
    Построй поэтапный план текущего этапа на основе уже выделенных зависимостей и модели
    поставки/приемки: последовательность работ, контрольные точки, критические риски и
    ограничения. Это не повторная инвентаризация зависимостей, а сводный план движения
    по этапу с учетом уже собранного контекста.
context_policy:
  max_tokens: 2600
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
