kind: template
id: common.alternatives_scan
version: 1.0.0
name: Сравнение альтернатив решения
type: executable
status: active
domain: common
semantics:
  template_role: meta_analysis
  cognitive_role: solution_design
  closes_gaps:
    - alternatives_not_explored
  raises_readiness:
    - dimension: alternatives_explored
      status: ready
activation:
  required_readiness:
    - goal_clarity
    - user_story_coverage
  forbidden_open_gaps:
    - unclear_goal
    - missing_user_stories
planning:
  priority: 80
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - clarification_notes
    - user_story_map
outputs:
  artifact_roles:
    - alternatives_analysis
framework:
  summary: Сравни несколько вариантов решения относительно пользовательских потребностей, ограничений и будущих изменений системы.
context_policy:
  max_tokens: 2200
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
