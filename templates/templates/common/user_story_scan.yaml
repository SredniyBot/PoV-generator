kind: template
id: common.user_story_scan
version: 1.0.0
name: Анализ user story
type: executable
status: active
domain: common
semantics:
  template_role: meta_analysis
  cognitive_role: requirements_discovery
  closes_gaps:
    - missing_user_stories
  raises_readiness:
    - dimension: user_story_coverage
      status: ready
activation:
  required_readiness:
    - goal_clarity
  forbidden_open_gaps:
    - unclear_goal
planning:
  priority: 90
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - clarification_notes
outputs:
  artifact_roles:
    - user_story_map
framework:
  summary: Определи ключевых акторов, пользовательские сценарии, ожидания и важные граничные случаи.
context_policy:
  max_tokens: 1800
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
