kind: template
id: ml.predictive_problem_definition
version: 1.0.0
name: Определение предиктивной задачи машинного обучения
type: executable
status: active
domain: ml
semantics:
  template_role: meta_analysis
  cognitive_role: predictive_problem_definition
  closes_gaps:
    - predictive_problem_undefined
  raises_readiness:
    - dimension: predictive_problem_defined
      status: ready
activation:
  required_readiness:
    - business_outcome_defined
    - scope_boundaries_defined
    - stakeholders_mapped
  forbidden_open_gaps:
    - business_outcome_unclear
    - scope_boundaries_missing
    - stakeholders_not_mapped
planning:
  priority: 98
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - business_outcome_model
    - scope_boundary_matrix
    - stakeholder_operating_model
outputs:
  artifact_roles:
    - predictive_problem_definition
framework:
  summary: >
    Формализуй задачу машинного обучения как задачу предиктивной аналитики: цель предсказания,
    определение события, горизонт прогноза, единицу предсказания, полезные для бизнеса выходы
    модели, базовые ожидания, метрики качества, требования к интерпретируемости и действия,
    которые должен поддерживать результат. Не подменяй бизнес-проблему формулой «сделать
    модель». Если определение события, горизонт или применимость результата неясны,
    фиксируй блокирующие вопросы.
context_policy:
  max_tokens: 2600
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
