kind: template
id: integration.operating_model
version: 1.0.0
name: Интеграционная и операционная модель
type: executable
status: active
domain: integration
semantics:
  template_role: meta_analysis
  cognitive_role: integration_operating_model
  closes_gaps:
    - integration_model_unassessed
  raises_readiness:
    - dimension: integration_model_defined
      status: ready
activation:
  required_readiness:
    - scope_boundaries_defined
    - stakeholders_mapped
  forbidden_open_gaps:
    - scope_boundaries_missing
    - stakeholders_not_mapped
planning:
  priority: 94
inputs:
  required_problem_fields:
    - business_request
  required_artifact_roles:
    - business_outcome_model
    - scope_boundary_matrix
    - stakeholder_operating_model
outputs:
  artifact_roles:
    - integration_operating_model
framework:
  summary: >
    Определи, как решение должно работать организационно и интеграционно: источники данных,
    формат взаимодействия (выгрузки, API, пакетное обновление), частота обновления, роли ИТ и бизнеса,
    эксплуатационная модель, поддержка и ключевые зависимости от корпоративных систем.
    Если критическая интеграционная схема или ответственность неясны, фиксируй блокирующие вопросы.
context_policy:
  max_tokens: 2400
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
