kind: template
id: frontend.user_flow_analysis
version: 2.0.0
name: Анализ пользовательских потоков, экранов и BI-представления
type: executable
status: active
domain: frontend
semantics:
  template_role: meta_analysis
  cognitive_role: user_flow_analysis
  closes_gaps:
    - frontend_user_flows_missing
  raises_readiness:
    - dimension: frontend_user_flows_covered
      status: ready
activation:
  required_readiness:
    - business_outcome_defined
    - scope_boundaries_defined
    - stakeholders_mapped
  forbidden_open_gaps:
    - business_outcome_unclear
    - scope_boundaries_missing
    - stakeholders_not_mapped
planning:
  priority: 93
inputs:
  required_problem_fields:
    - business_request
    - goal
  required_artifact_roles:
    - business_outcome_model
    - stakeholder_operating_model
    - scope_boundary_matrix
outputs:
  artifact_roles:
    - ui_requirements_outline
framework:
  summary: >
    Разбери, как пользователи будут потреблять результат решения: роли, пользовательские
    потоки, экраны, BI/аналитические представления, сценарии поддержки решений и UX-ограничения.
    Для корпоративных аналитических систем думай не только про CRUD-экраны, но и про дашборды,
    детализацию, пояснения к выводам и рекомендации. Если без уточнений нельзя понять целевой
    формат интерфейса, фиксируй блокирующие вопросы.
context_policy:
  max_tokens: 2600
tool_policy:
  allowed_tools: []
validation_policy:
  requires_review: false
