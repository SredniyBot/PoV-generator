# Пример Composite-шаблона: фаза работы с требованиями.
# Состоит из 3 последовательных executable-шагов.
id: requirements_phase
version: 1.0.0
type: composite
description: >-
  Цикл сбора требований: intake опросника → синтез ТЗ → валидация и
  подтверждение заказчиком. Bubble-up: итоговое ТЗ и журнал уточнений.
owner: g.orlov@pov-lab.ru
status: active
domain: common

input_requirements:
  - name: client_brief
    kind: hard
    artifact_type: brief
    schema_ref: pov_lab:input.brief@1.0.0
    selector:
      kind: by_type
      artifact_type: brief
    description: Исходный бизнес-запрос от заказчика.

output_contract:
  - name: final_requirements
    artifact_type: requirements
    mime_type: application/json
    schema_ref: pov_lab:output.requirements@1.0.0
    description: Согласованное ТЗ.
    required: true
    multiplicity: one
  - name: decision_log
    artifact_type: log
    mime_type: application/json
    description: Журнал решений и уточнений, сопровождавших фазу.
    required: true
    multiplicity: one

composite:
  children:
    - alias: intake
      template_id: questionnaire_intake
      template_version: "1.0.0"
      depends_on: []
      input_bindings:
        brief:
          from_parent_input: client_brief
    - alias: synthesis
      template_id: requirements_synthesis
      template_version: "1.0.0"
      depends_on:
        - intake
      input_bindings:
        questionnaire:
          from_alias: intake
          output: questionnaire
    - alias: review
      template_id: requirements_review
      template_version: "1.0.0"
      depends_on:
        - synthesis
      input_bindings:
        draft_requirements:
          from_alias: synthesis
          output: requirements_doc
        open_questions:
          from_alias: synthesis
          output: open_questions
  bubble_up_outputs:
    final_requirements:
      from_alias: review
      output: approved_requirements
    decision_log:
      from_alias: review
      output: decision_log

escalation:
  max_attempts: 1
  max_llm_calls: 20
  wall_clock_seconds: 3600

metadata:
  stage_gate: requirements
  labels:
    phase: "requirements"
  tags:
    - requirements
    - composite

provenance:
  actor: engineer:g.orlov
  timestamp: "2026-04-15T12:00:00Z"
  reason: initial publication
