# Пример Dynamic-шаблона: построение RAG-индекса.
# Решение о прямом исполнении vs декомпозиции принимается "на лету" по характеристикам корпуса.
id: rag_index_build
version: 1.2.0
type: dynamic
description: >-
  Создаёт RAG-индекс. При небольшом корпусе (< 1000 документов) — выполняется
  одним вызовом. При большом — декомпозируется на подзадачи: подготовка,
  параллельная эмбеддинг-генерация по шардам, финальная сборка индекса.
owner: g.orlov@pov-lab.ru
status: active
domain: rag

input_requirements:
  - name: corpus_descriptor
    kind: hard
    artifact_type: corpus_descriptor
    schema_ref: pov_lab:input.corpus_descriptor@1.0.0
    selector:
      kind: by_producer
      producer_template_id: corpus_ingest
      output_name: descriptor
    description: Описание корпуса (размер, MIME-типы, структура).

output_contract:
  - name: index_manifest
    artifact_type: rag_index
    mime_type: application/json
    schema_ref: pov_lab:output.rag_index@1.0.0
    description: Манифест построенного индекса (местоположение, размерность, модель эмбеддингов, метрики).
    required: true
    multiplicity: one

dynamic:
  decision_executor:
    model: anthropic:claude-haiku-4-5
    prompt_ref: pov_lab:prompt.rag_index_decomposition@1.0.0
    token_budget:
      input_tokens_max: 4000
      output_tokens_max: 1000
      total_tokens_max: 5000
    temperature: 0.0
    json_mode: true
  max_depth: 2
  max_children: 12
  decomposition_rules:
    - condition: "payload.corpus.document_count <= 1000 and payload.corpus.total_size_mib <= 200"
      action: execute
    - condition: "payload.corpus.document_count > 1000 or payload.corpus.total_size_mib > 200"
      action: decompose
      child_templates:
        - id: rag_corpus_preprocess
          version: "1.0.0"
        - id: rag_embedding_shard
          version: "1.1.0"
        - id: rag_index_assemble
          version: "1.0.0"
  fallback_template:
    id: rag_index_build_single
    version: "1.0.0"

escalation:
  max_attempts: 2
  max_llm_calls: 30
  wall_clock_seconds: 7200
  on_escalation:
    id: rag_index_build_human_assist
    version: "1.0.0"

metadata:
  stage_gate: implementation
  labels:
    cost_class: "high"
    requires_gpu: "true"
  tags:
    - rag
    - index
    - dynamic
  docs_url: "https://docs.pov-lab.ru/templates/rag_index_build"
  since_version: "1.0.0"

provenance:
  actor: engineer:g.orlov
  timestamp: "2026-04-15T12:00:00Z"
  reason: "bump to 1.2.0: добавлена fallback-ветка, уточнён budget decision_executor"
